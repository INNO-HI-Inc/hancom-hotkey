<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F7BE8"/>
      <stop offset="100%" stop-color="#2F4FB5"/>
    </linearGradient>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="offset" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <rect x="112" y="112" width="800" height="800" rx="180" ry="180" fill="url(#bg)"/>

  <g transform="translate(512,540)" text-anchor="middle" fill="#FFFFFF" font-family="-apple-system, SF Pro Display, sans-serif" font-weight="800">
    <text y="60" font-size="420">한</text>
  </g>

  <g transform="translate(780,780)">
    <rect x="-72" y="-72" width="144" height="144" rx="28" ry="28" fill="#FFFFFF" opacity="0.95"/>
    <text x="0" y="34" text-anchor="middle" fill="#2F4FB5" font-family="-apple-system, SF Pro Display, sans-serif" font-weight="800" font-size="148">⌃</text>
  </g>
</svg>
