name: HancomHotkey
options:
  bundleIdPrefix: com.innohi
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  defaultConfig: Release

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.2"

settings:
  base:
    DEVELOPMENT_TEAM: 4AL4PF4BK4
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "Developer ID Application"
    MARKETING_VERSION: "0.4.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: src/App/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.innohi.hancomhotkey
    PRODUCT_NAME: "$(TARGET_NAME)"
    CODE_SIGN_ENTITLEMENTS: src/App/HancomHotkey.entitlements

targets:
  HancomHotkey:
    type: application
    platform: macOS
    sources:
      - path: src
        excludes:
          - "**/*.plist"
          - "**/*.entitlements"
    resources:
      - path: src/Resources/Assets.xcassets
    dependencies:
      - package: Sparkle
    settings:
      base:
        LSUIElement: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 INNO-HI Inc."
